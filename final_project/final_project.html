<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volume Gambling Table</title>
  <link rel="stylesheet" href="final_project.css">
</head>
<body>
  <div class="app">
    <header>The Volume Gambling Table</header>

    <section class="instructions">
      <div class="instructions-text">Please add between 1-50 volume points for betting.</div>
    </section>

    <section class="controls">

        <div class="icon-container">
        <img src="Speaker_Icon.svg.png" alt="volume icon" class="volume-icon">
        </div>

        <label for="volume">Volume Number:</label>
        <input type="number" id="volume" name="volume" min="0" max="20">

        <button type="button" id="bet-btn" class="button">
            Bet!
        </button>

        <div class="indicators">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="results">
            <p>Starting Bet: <span id="starting-bet">0</span></p>
            <p>Current Volume: <span id="current-total">0</span></p>
            <p id="flip-result">Waiting for bet...</p>
        </div>
    </section>
  </div>

  <script src="final_project.js"></script>
</body>
</html>
