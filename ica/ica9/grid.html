<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body {
        font: 1.2em / 1.5 sans-serif;
    }

    .grid1 > * {
        background-color: #4d7298;
        border: 2px solid #77a6b6;
        border-radius: 0.5em;
        color: white;
        padding: 0.5em;
    }

    .grid1 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
    }



    

    .grid2 > * {
        border-radius: 0.5em;
        color: white;
        padding: 0.5em;
    }

    .item1 {
        background-color: rgb(74 102 112 / 70%);
        border: 5px solid rgb(74 102 112 / 100%);
        grid-column: 1 / 4;
        grid-row: 1 / 3;
    }

    .item2 {
        background-color: rgb(214 162 173 / 70%);
        border: 5px solid rgb(214 162 173 / 100%);
        grid-column: 2 / 5;
        grid-row: 2 / 4;
    }
    

    .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 100px 100px 100px;
        gap: 10px;
    }



   
    .grid3 > * {
        background-color: #4d7298;
        border: 2px solid #77a6b6;
        border-radius: 0.5em;
        color: white;
        padding: 0.5em;
    }

    .grid3 {
        display: grid;
        gap: 20px;
        grid-template-columns: 1fr 2fr;
        grid-template-areas:
            "aa aa"
            "bb cc"
            ". dd";
    }

    .one {
        grid-area: aa;
    }

    .two {
        grid-area: bb;
    }

    .three {
        grid-area: cc;
    }

    .four {
        grid-area: dd;
    }



    

    .card {
        display: grid;
        grid-template-rows: 200px min-content;
    }

    .card > img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .tags {
        margin: 0;
        padding: 0;
        list-style: none;
    }

    .tags > * {
        background-color: #999999;
        color: white;
        padding: 0.2em 0.8em;
        border-radius: 0.2em;
        font-size: 80%;
        margin: 5px;
    }

    .container {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr 1fr;
    }

    .tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }

</style>
</head>
<body>
    <div class="grid1">
        <div>One</div>
        <div>Two</div>
        <div>Three</div>
        <div>Four</div>
    </div>


    <div class="grid2">
        <div class="item1">One</div>
        <div class="item2">Two</div>
    </div>


    <div class="grid3">
        <div class="one">One</div>
        <div class="two">Two</div>
        <div class="three">Three</div>
        <div class="four">Four</div>
    </div>


    <div class="container">
        <div class="card">
            <img
            alt="a single red balloon"
            src="https://mdn.github.io/shared-assets/images/examples/balloons1.jpg" />
            <ul class="tags">
            <li>balloon</li>
            <li>red</li>
            <li>sky</li>
            <li>blue</li>
            <li>Hot air balloon</li>
            </ul>
        </div>
        <div class="card">
            <img
            alt="balloons over some houses"
            src="https://mdn.github.io/shared-assets/images/examples/balloons2.jpg" />
            <ul class="tags">
            <li>balloons</li>
            <li>houses</li>
            <li>train</li>
            <li>harborside</li>
            </ul>
        </div>
        <div class="card">
            <img
            alt="close-up of balloons inflating"
            src="https://mdn.github.io/shared-assets/images/examples/balloons3.jpg" />
            <ul class="tags">
            <li>balloons</li>
            <li>inflating</li>
            <li>green</li>
            <li>blue</li>
            </ul>
        </div>
        <div class="card">
            <img
            alt="a balloon in the sun"
            src="https://mdn.github.io/shared-assets/images/examples/balloons4.jpg" />
            <ul class="tags">
            <li>balloon</li>
            <li>sun</li>
            <li>sky</li>
            <li>summer</li>
            <li>bright</li>
            </ul>
        </div>
    </div>
    
</body>
</html>
